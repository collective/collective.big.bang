[buildout]
show-picked-versions = true
extensions =
    mr.developer

parts =
    instance
#    test
# we use tox for testing and linting, by default
#    code-analysis
    coverage
    test-coverage
    createcoverage
    i18ndude
    omelette
#    robot
    plone-helper-scripts
    create-site
    upgrade-steps
#    vscode

develop = .


[instance]
recipe = plone.recipe.zope2instance
user = admin:admin
http-address = 8080
environment-vars =
    zope_i18n_compile_mo_files true
eggs +=
    Plone
    Pillow
    collective.big.bang
zcml +=
    collective.big.bang


[vscode]
recipe = collective.recipe.vscode
eggs = ${instance:eggs}
autocomplete-use-omelette = True

# [code-analysis]
# recipe = plone.recipe.codeanalysis
# directory = ${buildout:directory}/src/collective
# return-status-codes = False


[omelette]
recipe = collective.recipe.omelette
eggs = ${instance:eggs}


[test]
recipe = zc.recipe.testrunner
eggs =
    ${instance:eggs}
    plone.app.robotframework[debug]
initialization =
    os.environ['TZ'] = 'UTC'
defaults = ['-s', 'collective.big.bang', '--auto-color', '--auto-progress']


[coverage]
recipe = zc.recipe.egg
eggs = coverage


[test-coverage]
recipe = collective.recipe.template
input = inline:
    #!/bin/bash
    export TZ=UTC
    ${buildout:directory}/bin/coverage run bin/test $*
    ${buildout:directory}/bin/coverage html
    ${buildout:directory}/bin/coverage report -m --fail-under=90
    # Fail (exit status 1) if coverage returns exit status 2 (this happens
    # when test coverage is below 100%.
output = ${buildout:directory}/bin/test-coverage
mode = 755


[createcoverage]
recipe = zc.recipe.egg
eggs = createcoverage


[robot]
recipe = zc.recipe.egg
eggs =
    ${test:eggs}
    plone.app.robotframework[debug,reload]


[i18ndude]
recipe = zc.recipe.egg
eggs = i18ndude

[plone-helper-scripts]
recipe = zc.recipe.egg
eggs =
   Products.CMFPlone
   ${instance:eggs}
interpreter = zopepy
scripts =
   zopepy
   plone-compile-resources

[create-site]
recipe = collective.recipe.template
input = inline:
    #!/usr/bin/env python
    import sys
    import plone.recipe.zope2instance.ctl
    sys.exit(plone.recipe.zope2instance.ctl.main(
        ['-C', '${buildout:directory}/parts/instance/etc/zope.conf',
         '-p', '${buildout:directory}/parts/instance/bin/interpreter',
         '-w', '${buildout:directory}/parts/instance/etc/wsgi.ini',
         'run', '${buildout:directory}/scripts/create_site.py']
        + sys.argv[1:]))
output = ${buildout:directory}/bin/create_site
mode = 755

[upgrade-steps]
recipe = collective.recipe.template
input = inline:
    #!/usr/bin/env python
    import sys
    import plone.recipe.zope2instance.ctl
    sys.exit(plone.recipe.zope2instance.ctl.main(
        ['-C', '${buildout:directory}/parts/instance/etc/zope.conf',
         '-p', '${buildout:directory}/parts/instance/bin/interpreter',
         '-w', '${buildout:directory}/parts/instance/etc/wsgi.ini',
         'run', '${buildout:directory}/scripts/upgrade_steps.py']
        + sys.argv[1:]))
output = ${buildout:directory}/bin/upgrade_steps
mode = 755

[versions]
# Don't use a released version of collective.big.bang
collective.big.bang =
